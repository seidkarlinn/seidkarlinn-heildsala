on:
  repository_dispatch:
    types: [catalog-update]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update catalog
        env:
          STATE_JSON: ${{ toJson(github.event.client_payload.state) }}
        run: |
          python3 -c "
          import json, re, os
          state = json.loads(os.environ['STATE_JSON'])
          deleted = state.get('deleted', [])
          html = open('index.html').read()
          new_val = 'const ADMIN_DELETED = ' + json.dumps(deleted) + ';'
          html = re.sub(r'const ADMIN_DELETED = \[.*?\];', new_val, html, flags=re.DOTAL
