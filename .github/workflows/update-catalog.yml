on:
  repository_dispatch:
    types: [catalog-update]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update catalog
        env:
          STATE_JSON: ${{ toJson(github.event.client_payload.state) }}
        run: |
          python3 -c "
          import json, re, os
          state = json.loads(os.environ['STATE_JSON'])
          deleted = state.get('deleted', [])
          html = open('index.html').read()
          new_val = 'const ADMIN_DELETED = ' + json.dumps(deleted) + ';'
          html = re.sub(r'const ADMIN_DELETED = \[.*?\];', new_val, html, flags=re.DOTALL)
          html = html.replace(
            'const _src = (typeof PRODUCTS_BASE !== \'undefined\' && PRODUCTS_BASE.length) ? PRODUCTS_BASE : PRODUCTS;',
            'const _src = window.PRODUCTS_BASE || (typeof PRODUCTS_BASE !== \'undefined\' ? PRODUCTS_BASE : PRODUCTS);'
          )
          open('index.html', 'w').write(html)
          print('Done:', len(deleted), 'deleted')
          "

      - name: Commit
        run: |
          git config user.email "sync@seidkarlinn.is"
          git config user.name "Sync"
          git add index.html
          git diff --staged --quiet && echo "ok" || (git commit -m "sync" && git push)
