<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greiðslu hætt við — Seiðkarlinn Heildsala</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--red:#C0392B;--red-l:#FDECEA;--ink:#1A1710;--ink2:#5C5848;--paper:#FAF8F3;--green:#2A5C2A;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
  .card{background:#fff;border-radius:16px;padding:3rem 2.5rem;width:min(480px,100%);text-align:center;box-shadow:0 4px 32px rgba(0,0,0,.08);}
  .icon{font-size:56px;margin-bottom:1rem;}
  h1{font-family:'Playfair Display',serif;font-size:26px;color:var(--red);margin-bottom:.75rem;}
  p{font-size:14px;color:var(--ink2);line-height:1.7;margin-bottom:.5rem;}
  .back-btn{display:inline-block;margin-top:1.5rem;padding:10px 24px;background:var(--green);color:#fff;border-radius:8px;text-decoration:none;font-size:14px;font-weight:500;}
  .back-btn:hover{background:#1e431e;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">↩️</div>
  <h1>Greiðslu hætt við</h1>
  <p>Greiðslunni var hætt við eða villa kom upp. Karfan þín er enn óbreytt.</p>
  <p>Vinsamlegast reyndu aftur eða hafðu samband við okkur ef vandinn heldur áfram.</p>
  <a href="/index.html" class="back-btn">← Til baka í verslun</a>
</div>
</body>
</html>
